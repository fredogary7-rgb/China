<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | TokenFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #5D5FEF;
            --bg-page: #F4F7FE;
            --white: #ffffff;
            --text-dark: #1A202C;
            --text-muted: #718096;
            --success: #27AE60;
            --danger: #EB5757;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-page);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Bannière Image TokenFlow */
        .banner { 
            width: 100%; 
            height: 160px; 
            position: relative;
            background: linear-gradient(135deg, #5D5FEF 0%, #8B5CF6 50%, #06B6D4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .banner-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3));
        }

        .content { padding: 25px; }
        
        h1 { 
            color: var(--text-dark); 
            font-size: 20px; 
            font-weight: 800; 
            margin-bottom: 6px; 
            text-align: center;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }

        .flash { padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; font-weight: 600; text-align: center; }
        .flash.danger { background: #FFF5F5; color: var(--danger); border: 1px solid #FED7D7; }
        .flash.success { background: #F0FFF4; color: var(--success); border: 1px solid #C6F6D5; }

        .input-group {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            margin-bottom: 12px;
            padding: 2px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(93, 95, 239, 0.1);
        }

        .input-group i { color: var(--primary); font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

        .input-group input, .input-group select {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-dark);
            width: 100%;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-register-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 10px 20px rgba(93, 95, 239, 0.2);
            transition: 0.3s;
        }

        .btn-register-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(93, 95, 239, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E2E8F0;
        }

        .divider span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .social-btn {
            padding: 10px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .social-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #EEF2FF;
        }

        .footer-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #EDF2F7;
            text-align: center;
        }
        .footer-text { color: var(--text-muted); font-size: 13px; font-weight: 500; margin-bottom: 10px; }
        
        .btn-login-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
        }
        .btn-login-link:hover { text-decoration: underline; }

        .password-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .content { padding: 20px; }
            .social-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <svg class="banner-svg" viewBox="0 0 400 160" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <!-- Background circles -->
            <circle cx="50" cy="80" r="120" fill="rgba(255,255,255,0.05)"/>
            <circle cx="350" cy="80" r="100" fill="rgba(255,255,255,0.03)"/>
            <circle cx="200" cy="160" r="80" fill="rgba(255,255,255,0.04)"/>
            
            <!-- Flow lines -->
            <path d="M0,80 Q100,20 200,80 T400,80" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
            <path d="M0,100 Q100,40 200,100 T400,100" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" fill="none"/>
            <path d="M0,60 Q100,120 200,60 T400,60" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
            
            <!-- TokenFlow Logo T -->
            <g transform="translate(170, 40)">
                <rect x="0" y="0" width="60" height="60" rx="15" fill="rgba(255,255,255,0.2)" />
                <text x="30" y="42" font-family="Plus Jakarta Sans, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">T</text>
            </g>
            
            <!-- Text -->
            <text x="200" y="130" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">TokenFlow</text>
            <text x="200" y="148" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Rejoignez la révolution</text>
            
            <!-- Decorative dots -->
            <circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.3)"/>
            <circle cx="320" cy="50" r="2" fill="rgba(255,255,255,0.2)"/>
            <circle cx="120" cy="120" r="2" fill="rgba(255,255,255,0.25)"/>
            <circle cx="280" cy="130" r="3" fill="rgba(255,255,255,0.2)"/>
        </svg>
        <div class="banner-overlay"></div>
    </div>

    <div class="content">
        <h1>Créer un compte</h1>
        <span class="subtitle">Rejoignez notre réseau de partenaires</span>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Nom d'utilisateur" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Adresse email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-earth-africa"></i>
                <select name="pays" required>
                    <option value="" disabled selected>Choisir mon pays</option>
                    <option value="Bénin">🇧🇯 Bénin</option>
                    <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                    <option value="Cameroun">🇨🇲 Cameroun</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Gabon">🇬🇦 Gabon</option>
                    <option value="Guinée">🇬🇳 Guinée</option>
                    <option value="Mali">🇲🇱 Mali</option>
                    <option value="Niger">🇳🇪 Niger</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Togo">🇹🇬 Togo</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" name="phone" placeholder="Numéro de téléphone" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Mot de passe" required>
                <button type="button" class="password-toggle" onclick="togglePassword(this, 'password')">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-circle-check"></i>
                <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required>
                <button type="button" class="password-toggle" onclick="togglePassword(this, 'confirm_password')">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-ticket"></i>
                <input type="text" name="code_invitation" placeholder="Code d'invitation (optionnel)" value="{{ code_ref if code_ref else '' }}">
            </div>

            <button type="submit" class="btn-register-submit">
                Commencer l'aventure
            </button>
        </form>

        <div class="divider">
            <span>ou s'inscrire avec</span>
        </div>

        <div class="social-buttons">
            <button class="social-btn" onclick="signupWithGoogle()">
                <i class="fa-brands fa-google" style="color: #DB4437;"></i>
                Google
            </button>
            <button class="social-btn" onclick="signupWithApple()">
                <i class="fa-brands fa-apple"></i>
                Apple
            </button>
        </div>

        <div class="footer-box">
            <div class="footer-text">Vous avez déjà un compte ?</div>
            <a href="{{ url_for('connexion_page') }}" class="btn-login-link">
                Se connecter maintenant
            </a>
        </div>
    </div>
</div>

<script>
function togglePassword(btn, inputName) {
    const input = btn.parentElement.querySelector(`input[name="${inputName}"]`);
    const icon = btn.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
    }
}

// Google Sign-Up - Redirection directe vers OAuth backend
function signupWithGoogle() {
    window.location.href = '/auth/google?register=true';
}

// Apple Sign-Up
function signupWithApple() {
    window.location.href = '/auth/apple?register=true';
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge</title>

<style>

:root{
--orange-main:#e88e0c;
--blue-header:#3498db;
--text-gray:#666;
}

body{
font-family:Arial;
background:#1a1a1a;
margin:0;
display:flex;
justify-content:center;
}

.app-container{
width:100%;
max-width:450px;
background:white;
min-height:100vh;
}

.page{
display:none;
padding-bottom:30px;
}

.active{
display:block;
}

.header-blue{
background:var(--blue-header);
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.grid-amounts{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.amount-btn{
background:var(--orange-main);
color:white;
padding:20px;
border-radius:8px;
font-weight:bold;
border:none;
cursor:pointer;
font-size:16px;
}

.gopay-header{
text-align:center;
padding:30px 20px;
}

.logo-gopay{
width:70px;
margin-bottom:10px;
}

.instruction-text{
font-size:14px;
color:var(--text-gray);
}

.selector{
padding:0 25px;
margin-top:10px;
}

.selector select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

.phone-box{
padding:0 25px;
margin-top:15px;
}

.phone-input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
}

.btn-confirm{
background:linear-gradient(to right,#e88e0c,#f3b14b);
color:white;
width:80%;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
display:block;
margin:30px auto;
}

.page3{
padding:20px;
}

.card-info{
background:#f8f9fa;
border-radius:12px;
padding:15px;
margin:15px 0;
}

.label-small{
font-size:12px;
color:#777;
}

.val-orange{
color:var(--orange-main);
font-size:22px;
font-weight:bold;
}

.btn-pay{
display:block;
background:var(--orange-main);
color:white;
text-align:center;
padding:15px;
border-radius:30px;
font-size:18px;
font-weight:bold;
text-decoration:none;
margin-top:20px;
}

#loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<div id="loading">Traitement...</div>

<div class="app-container">

<!-- PAGE 1 -->

<div id="page1" class="page active">

<div class="header-blue">Recharge</div>

<div class="grid-amounts">

<button class="amount-btn" onclick="selectAmount(4000)">4000</button>
<button class="amount-btn" onclick="selectAmount(8000)">8000</button>
<button class="amount-btn" onclick="selectAmount(12000)">12000</button>
<button class="amount-btn" onclick="selectAmount(21000)">21000</button>
<button class="amount-btn" onclick="selectAmount(40000)">40000</button>
<button class="amount-btn" onclick="selectAmount(100000)">100000</button>
<button class="amount-btn" onclick="selectAmount(150000)">150000</button>
<button class="amount-btn" onclick="selectAmount(250000)">250000</button>
<button class="amount-btn" onclick="selectAmount(500000)">500000</button>

</div>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="gopay-header">

<img src="/static/images/g.png" class="logo-gopay">

<p class="instruction-text">
Veuillez remplir les informations de paiement
</p>

<div>
Montant : <b id="amountDisplay">0</b> FCFA
</div>

</div>

<div class="selector">

<label>Pays</label>

<select id="country">

<option value="Burkina Faso">Burkina Faso</option>
<option value="Togo">Togo</option>
<option value="Benin">Bénin</option>
<option value="Cameroun">Cameroun</option>
<option value="Cote dIvoire">Côte d'Ivoire</option>

</select>

</div>

<div class="selector">

<label>Opérateur</label>

<select id="operator">

<option value="ORANGE">Orange Money</option>
<option value="MTN">MTN Money</option>
<option value="MOOV">Moov Money</option>

</select>

</div>

<div class="phone-box">

<input class="phone-input" id="phone" placeholder="Numéro de paiement">

</div>

<button class="btn-confirm" onclick="goToPayment()">Continuer</button>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<div class="page3">

<h3>Informations paiement</h3>

<div class="card-info">

<div class="label-small">Montant</div>
<div class="val-orange" id="amountFinal"></div>

</div>

<a id="payBtn" class="btn-pay">Payer maintenant</a>

</div>

</div>

</div>

<script>

let amountSelected=0;

function selectAmount(amount){

amountSelected=amount;

document.getElementById("amountDisplay").innerText=amount;

showPage("page2");

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function goToPayment(){

const phone=document.getElementById("phone").value;
const country=document.getElementById("country").value;
const operator=document.getElementById("operator").value;

if(phone==""){
alert("Entrez le numéro de paiement");
return;
}

document.getElementById("amountFinal").innerText=amountSelected+" FCFA";

document.getElementById("payBtn").onclick=function(){

createDeposit(phone,country,operator);

};

showPage("page3");

}

function createDeposit(phone,country,operator){

document.getElementById("loading").style.display="flex";

const data=new URLSearchParams();

data.append("montant",amountSelected);
data.append("phone",phone);
data.append("country",country);
data.append("operator",operator);
data.append("fullname","Paiement Client");

fetch("/deposit",{
method:"POST",
body:data
})
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none";

if(data.error){

alert(data.error);

}else{

window.location.href=data.url;

}

})

.catch(()=>{

document.getElementById("loading").style.display="none";

alert("Erreur serveur");

});

}

</script>

</body>
</html>

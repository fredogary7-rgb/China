<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Assistant | TokenFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary: #6366F1;
  --primary-light: rgba(99, 102, 241, 0.1);
  --primary-gradient: linear-gradient(135deg, #6366F1, #8B5CF6);
  --bg-page: #F1F5F9;
  --white: #FFFFFF;
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --border-color: rgba(148, 163, 184, 0.2);
  --user-msg-bg: #6366F1;
  --ai-msg-bg: #F1F5F9;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

* { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

body {
  margin: 0;
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.chat-header {
  background: var(--white);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  background: var(--bg-page);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.back-btn:active { transform: scale(0.9); }

.header-info { flex: 1; }

.header-info h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
}

.header-info span {
  font-size: 12px;
  color: var(--text-muted);
}

.ai-avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--primary-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

/* Status indicator */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10B981;
  position: absolute;
  bottom: 2px;
  right: 2px;
  border: 2px solid var(--white);
}

.status-wrapper { position: relative; }

/* Chat Messages */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
}

.message {
  display: flex;
  gap: 12px;
  max-width: 90%;
  animation: messageIn 0.3s ease;
}

@keyframes messageIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message.ai {
  align-self: flex-start;
}

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.message.ai .message-avatar {
  background: var(--primary-gradient);
  color: white;
}

.message.user .message-avatar {
  background: var(--text-muted);
  color: white;
}

.message-content {
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}

.message.ai .message-content {
  background: var(--ai-msg-bg);
  border-bottom-left-radius: 4px;
  color: var(--text-primary);
}

.message.user .message-content {
  background: var(--user-msg-bg);
  border-bottom-right-radius: 4px;
  color: white;
}

/* Message links */
.message-content a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.message.user .message-content a {
  color: white;
  text-decoration: underline;
}

/* Message lists */
.message-content ul {
  margin: 8px 0;
  padding-left: 20px;
}

.message-content li {
  margin: 4px 0;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* Quick Questions */
.quick-questions {
  padding: 0 20px 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.quick-questions::-webkit-scrollbar { display: none; }

.quick-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-color);
  background: var(--white);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.quick-btn:hover {
  background: var(--primary-light);
  color: var(--primary);
  border-color: var(--primary);
}

.quick-btn:active { transform: scale(0.95); }

/* Input Area */
.input-area {
  background: var(--white);
  padding: 12px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  border-top: 1px solid var(--border-color);
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border-color);
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  background: var(--bg-page);
}

.input-wrapper input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--primary-gradient);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.send-btn:hover { transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }

/* Welcome message */
.welcome-card {
  background: var(--white);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  margin: 20px;
  box-shadow: var(--shadow);
}

.welcome-card .ai-avatar {
  width: 64px;
  height: 64px;
  border-radius: 20px;
  margin: 0 auto 16px;
  font-size: 28px;
}

.welcome-card h3 {
  margin: 0 0 8px;
  font-size: 18px;
  font-weight: 800;
}

.welcome-card p {
  margin: 0;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Responsive */
@media (max-width: 480px) {
  .message { max-width: 95%; }
  .chat-container { padding: 16px; }
  .welcome-card { margin: 16px; padding: 20px; }
}
</style>
</head>

// ============================================
// FONCTIONS DE L'IA
// ============================================

function getAIResponse(message) {
  const lowerMsg = message.toLowerCase().trim();
  
  // Vérifier les salutations en premier
  if (/^(bonjour|salut|coucou|hello|hi|bonsoir|hey)\s*$/i.test(lowerMsg)) {
    return knowledgeBase.greetings.responses[0];
  }
  
  // Vérifier les au revoir
  if (/^(au revoir|bye|à bientôt|a bientot|ciao)/i.test(lowerMsg)) {
    return knowledgeBase.goodbye.responses[Math.floor(Math.random() * knowledgeBase.goodbye.responses.length)];
  }
  
  // Recherche par mots-clés
  let bestMatch = null;
  let bestScore = 0;
  
  for (const [category, data] of Object.entries(knowledgeBase)) {
    if (category === 'default' || category === 'greetings' || category === 'goodbye') continue;
    
    let score = 0;
    for (const keyword of data.keywords) {
      if (lowerMsg.includes(keyword.toLowerCase())) {
        score++;
      }
    }
    
    if (score > bestScore) {
      bestScore = score;
      bestMatch = data;
    }
  }
  
  // Si on a trouvé une correspondance avec au moins 1 mot-clé
  if (bestMatch && bestScore >= 1) {
    return bestMatch.responses[Math.floor(Math.random() * bestMatch.responses.length)];
  }
  
  // Réponse par défaut
  return knowledgeBase.default.responses[Math.floor(Math.random() * knowledgeBase.default.responses.length)];
}

function addMessage(text, isUser = false) {
  const container = document.getElementById('chatContainer');
  
  // Remove welcome card if exists
  const welcome = container.querySelector('.welcome-card');
  if (welcome) welcome.remove();
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
  
  // Convertir le formatage Markdown simple en HTML
  let formattedText = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  
  messageDiv.innerHTML = `
    <div class="message-avatar">
      <i class="fa-solid ${isUser ? 'fa-user' : 'fa-robot'}"></i>
    </div>
    <div class="message-content">${formattedText}</div>
  `;
  
  container.appendChild(messageDiv);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message ai';
  typingDiv.id = 'typingMessage';
  typingDiv.innerHTML = `
    <div class="message-avatar">
      <i class="fa-solid fa-robot"></i>
    </div>
    <div class="message-content">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('messageInput');
  const message = input.value.trim();
  
  if (!message) return;
  
  addMessage(message, true);
  input.value = '';
  
  // Show typing indicator
  showTyping();
  
  // Simulate AI response delay (more natural)
  const delay = 800 + Math.random() * 1200;
  setTimeout(() => {
    const typingMsg = document.getElementById('typingMessage');
    if (typingMsg) typingMsg.remove();
    
    const response = getAIResponse(message);
    addMessage(response);
  }, delay);
}

function sendQuick(question) {
  const input = document.getElementById('messageInput');
  input.value = question;
  sendMessage();
}

function handleKeyPress(event) {
  if (event.key === 'Enter') {
    sendMessage();
  }
}

// Scroll to bottom on load
window.addEventListener('load', () => {
  const container = document.getElementById('chatContainer');
  container.scrollTop = container.scrollHeight;
});
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration Portefeuille | TokenFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary: #5D5FEF;
  --primary-light: rgba(93, 95, 239, 0.1);
  --bg-page: #F4F7FE;
  --white: #ffffff;
  --text-dark: #1A202C;
  --text-muted: #718096;
}

*{ box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }

body{
    margin:0;
    background-color: var(--bg-page);
    color: var(--text-dark);
    min-height:100vh;
}

.app{
    max-width:480px;
    margin:auto;
    padding: 30px 20px 120px;
}

.header{
    text-align: center;
    margin-bottom: 35px;
}
.header i {
    font-size: 45px;
    color: var(--primary);
    margin-bottom: 15px;
    display: block;
}
.header h2{
    margin:0;
    font-size:22px;
    font-weight:800;
    letter-spacing: -0.5px;
}
.header p{
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 5px;
}

.card{
    background: var(--white);
    border-radius:24px;
    padding:20px;
    border: 1px solid rgba(0,0,0,0.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.02);
    margin-bottom:20px;
}

.card label{
    display: block;
    font-size:12px;
    font-weight:800;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
}

select, input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border: 1px solid #E2E8F0;
    font-size:15px;
    background: #F8FAFC;
    color: var(--text-dark);
    font-weight: 600;
    outline: none;
    transition: 0.3s;
}

select:focus, input:focus {
    border-color: var(--primary);
    background: var(--white);
}

button{
    margin-top:10px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background: var(--primary);
    color: #fff;
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(93, 95, 239, 0.2);
}

button:active{
    transform: scale(0.97);
}

.secure-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}
</style>
</head>
<body>

<div class="app">

    <div class="header">
        <i class="fa-solid fa-shield-halved"></i>
        <h2>Sécuriser mon compte</h2>
        <p>Liez un portefeuille pour vos retraits</p>
    </div>

    <form method="POST">
        <div class="card">
            <label><i class="fa-solid fa-earth-africa"></i> Pays de résidence</label>
            <select name="country" id="countrySelect" required onchange="updateOperators()">
                <option value="" disabled selected>Choisir un pays</option>
                <option value="Bénin">Bénin</option>
                <option value="Burkina Faso">Burkina Faso</option>
                <option value="Cameroun">Cameroun</option>
                <option value="Côte d'Ivoire">Côte d'Ivoire</option>
                <option value="Gabon">Gabon</option>
                <option value="Guinée">Guinée</option>
                <option value="Mali">Mali</option>
                <option value="Niger">Niger</option>
                <option value="Sénégal">Sénégal</option>
                <option value="Togo">Togo</option>
            </select>
        </div>

        <div class="card">
            <label><i class="fa-solid fa-wallet"></i> Moyen de paiement</label>
            <select name="operator" id="operatorSelect" required>
                <option value="" disabled selected>Sélectionnez le pays d'abord</option>
            </select>
        </div>

        <div class="card">
            <label><i class="fa-solid fa-fingerprint"></i> Numéro de compte</label>
            <input type="tel" name="number" placeholder="Ex: 00228..." required>
        </div>

        <button type="submit">Enregistrer le portefeuille</button>
    </form>

    <div class="secure-note">
        <i class="fa-solid fa-lock"></i>
        Vos données de paiement sont chiffrées et sécurisées.
    </div>

</div>

<script>
const data = {
    "Bénin": ["MTN Money", "Moov Money"],
    "Burkina Faso": ["Orange Money", "Moov Money"],
    "Cameroun": ["MTN Money", "Orange Money"],
    "Côte d'Ivoire": ["MTN Money", "Orange Money", "Moov Money", "Wave"],
    "Sénégal": ["Orange Money", "Free Money", "Wave"],
    "Togo": ["TMoney", "Moov Money"],
    "Guinée": ["Orange Money", "MTN Money"],
    "Mali": ["Orange Money", "Moov Money"],
    "Niger": ["Airtel Money", "Moov Money"],
    "Gabon": ["Airtel Money", "Moov Money"]
};

function updateOperators() {
    const country = document.getElementById("countrySelect").value;
    const operatorSelect = document.getElementById("operatorSelect");

    operatorSelect.innerHTML = '<option value="" disabled selected>Choisir l\'opérateur</option>';

    if (data[country]) {
        data[country].forEach(op => {
            const option = document.createElement("option");
            option.value = op;
            option.textContent = op;
            operatorSelect.appendChild(option);
        });
    }
}
</script>

</body>
</html>

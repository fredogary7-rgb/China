<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajouter un portefeuille | TotalEnergies</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --green-primary: #22c55e;
    --bg-dark: #071a13;
    --card-bg: rgba(255, 255, 255, 0.05);
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg, #06261b, #071a13);
    color:#fff;
    min-height:100vh;
}

.app{
    max-width:480px;
    margin:auto;
    padding:40px 16px 120px;
}

.header{
    margin-bottom:30px;
    text-align: center;
}
.header h2{
    margin:0;
    font-size:22px;
    font-weight:600;
    color: var(--green-primary);
}
.header small{
    opacity:.7;
}

.card{
    background: var(--card-bg);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    border: 1px solid rgba(34, 197, 94, 0.2);
    margin-bottom:18px;
}

.card h3{
    margin:0 0 5px;
    font-size:14px;
    color: var(--green-primary);
    text-transform: uppercase;
    letter-spacing: 1px;
}

select, input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size:15px;
    background: rgba(0,0,0,0.2);
    color:#fff;
    outline: none;
}

select option {
    background: #071a13;
}

button{
    margin-top:20px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color:#071a13;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition: 0.3s;
}

button:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
}
</style>
</head>
<body>

<div class="app">

    <div class="header">
        <div style="font-size: 40px; margin-bottom: 10px;"><i class="fa-solid fa-wallet"></i></div>
        <h2>Mon Portefeuille</h2>
        <small>Configurez vos informations de paiement</small>
    </div>

    <form method="POST">
        <div class="card">
            <h3><i class="fa-solid fa-globe"></i> Votre Pays</h3>
            <select name="country" id="countrySelect" required onchange="updateOperators()">
                <option value="" disabled selected>Choisir un pays</option>
                <option value="Bénin">🇧🇯 Bénin</option>
                <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                <option value="Cameroun">🇨🇲 Cameroun</option>
                <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                <option value="Sénégal">🇸🇳 Sénégal</option>
                <option value="Togo">🇹🇬 Togo</option>
            </select>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-building-columns"></i> Opérateur</h3>
            <select name="operator" id="operatorSelect" required>
                <option value="" disabled selected>Sélectionnez d'abord le pays</option>
            </select>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-phone"></i> Numéro de compte</h3>
            <input type="tel" name="number" placeholder="Ex: 00228..." required>
        </div>

        <button type="submit">Enregistrer le portefeuille</button>
    </form>

</div>

<script>
const data = {
    "Bénin": ["MTN Money", "Moov Money"],
    "Burkina Faso": ["Orange Money", "Moov Money"],
    "Cameroun": ["MTN Money", "Orange Money"],
    "Côte d'Ivoire": ["MTN Money", "Orange Money", "Moov Money", "Wave"],
    "Sénégal": ["Orange Money", "Free Money", "Wave"],
    "Togo": ["TMoney", "Moov Money"]
};

function updateOperators() {
    const country = document.getElementById("countrySelect").value;
    const operatorSelect = document.getElementById("operatorSelect");
    
    // Vider la liste actuelle
    operatorSelect.innerHTML = '<option value="" disabled selected>Choisir l\'opérateur</option>';
    
    if (data[country]) {
        data[country].forEach(op => {
            const option = document.createElement("option");
            option.value = op;
            option.textContent = op;
            operatorSelect.appendChild(option);
        });
    }
}
</script>

</body>
</html>

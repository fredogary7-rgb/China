<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Emirates</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #5D5FEF;
            --bg-page: #F4F7FE;
            --white: #ffffff;
            --text-dark: #1A202C;
            --text-muted: #718096;
            --success: #27AE60;
            --danger: #EB5757;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-page);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Bannière Image Emirates mise à jour */
        .banner { 
            width: 100%; 
            height: 180px; 
            position: relative;
            background: #1e1e1e; /* Fond de secours */
        }
        
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* L'image couvrira toute la zone sans être déformée */
        }

        /* Overlay optionnel pour faire ressortir le texte si tu veux en rajouter sur l'image */
        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3));
        }

        .content { padding: 30px; }
        
        h1 { 
            color: var(--text-dark); 
            font-size: 22px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            text-align: center;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
            display: block;
        }

        .flash { padding: 12px 15px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; font-weight: 600; text-align: center; }
        .flash.danger { background: #FFF5F5; color: var(--danger); border: 1px solid #FED7D7; }
        .flash.success { background: #F0FFF4; color: var(--success); border: 1px solid #C6F6D5; }

        .input-group {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            margin-bottom: 16px;
            padding: 2px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(93, 95, 239, 0.1);
        }

        .input-group i { color: var(--primary); font-size: 16px; width: 20px; text-align: center; }

        .input-group input, .input-group select {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-dark);
            width: 100%;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-login-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(93, 95, 239, 0.2);
            transition: 0.3s;
        }

        .btn-login-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(93, 95, 239, 0.3);
        }

        .footer-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #EDF2F7;
            text-align: center;
        }
        .footer-text { color: var(--text-muted); font-size: 14px; font-weight: 500; margin-bottom: 12px; }
        
        .btn-register-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <img src="{{ url_for('static', filename='images/e2.jpg') }}" alt="Emirates">
        <div class="banner-overlay"></div>
    </div>

    <div class="content">
        <h1>Bon retour</h1>
        <span class="subtitle">Accédez à votre espace membre</span>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <i class="fa-solid fa-earth-africa"></i>
                <select name="pays" required>
                    <option value="" disabled selected>Choisir mon pays</option>
                    <option value="Bénin">🇧🇯 Bénin</option>
                    <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                    <option value="Cameroun">🇨🇲 Cameroun</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Gabon">🇬🇦 Gabon</option>
                    <option value="Guinée">🇬🇳 Guinée</option>
                    <option value="Mali">🇲🇱 Mali</option>
                    <option value="Niger">🇳🇪 Niger</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Togo">🇹🇬 Togo</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" name="phone" placeholder="Numéro de téléphone" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>

            <button type="submit" class="btn-login-submit">
                Se connecter
            </button>
        </form>

        <div class="footer-box">
            <div class="footer-text">Nouveau sur Emirates ?</div>
            <a href="{{ url_for('inscription_page') }}" class="btn-register-link">
                Créer un compte gratuitement
            </a>
        </div>
    </div>
</div>

</body>
</html>

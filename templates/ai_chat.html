<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Assistant | TokenFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  /* Palette Fintech Premium - Thème Clair */
  --bg-page: #F1F5F9;
  --bg-card: rgba(255, 255, 255, 0.85);
  --bg-glass: rgba(255, 255, 255, 0.65);
  --border-glow: rgba(99, 102, 241, 0.2);
  --border-card: rgba(148, 163, 184, 0.2);
  
  /* Primary */
  --primary: #6366F1;
  --primary-glow: rgba(99, 102, 241, 0.15);
  --primary-gradient: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  
  /* Text */
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  
  /* Messages */
  --user-msg-bg: var(--primary-gradient);
  --ai-msg-bg: #F1F5F9;
}

* { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-page);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Background animé */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Header */
.chat-header {
  background: var(--bg-card);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-card);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border-card);
  background: var(--bg-glass);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.back-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.back-btn:active { transform: scale(0.9); }

.header-info { flex: 1; }

.header-info h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
}

.header-info span {
  font-size: 12px;
  color: var(--text-muted);
}

.ai-avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--primary-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: 0 4px 12px var(--primary-glow);
  position: relative;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10B981;
  position: absolute;
  bottom: 2px;
  right: 2px;
  border: 2px solid var(--bg-dark);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-wrapper { position: relative; }

/* Chat Container */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
}

/* Welcome Card */
.welcome-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  border: 1px solid var(--border-card);
  max-width: 400px;
  margin: 20px auto;
  backdrop-filter: blur(20px);
}

.welcome-card .ai-avatar {
  width: 80px;
  height: 80px;
  border-radius: 24px;
  margin: 0 auto 20px;
  font-size: 36px;
  box-shadow: 0 8px 32px var(--primary-glow);
}

.welcome-card h3 {
  margin: 0 0 12px;
  font-size: 22px;
  font-weight: 800;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.welcome-card p {
  margin: 0;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Messages */
.message {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: messageIn 0.3s ease;
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message.ai {
  align-self: flex-start;
}

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.message.ai .message-avatar {
  background: var(--primary-gradient);
  color: white;
}

.message.user .message-avatar {
  background: var(--text-muted);
  color: white;
}

.message-content {
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}

.message.ai .message-content {
  background: var(--ai-msg-bg);
  border-bottom-left-radius: 4px;
  color: var(--text-primary);
  border: 1px solid var(--border-card);
}

.message.user .message-content {
  background: var(--user-msg-bg);
  border-bottom-right-radius: 4px;
  color: white;
}

.message-content strong {
  color: var(--primary);
  font-weight: 700;
}

.message.user .message-content strong {
  color: white;
}

.message-content a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.message-content ul {
  margin: 8px 0;
  padding-left: 20px;
}

.message-content li {
  margin: 4px 0;
}

/* Typing Indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* Quick Questions */
.quick-questions {
  padding: 0 20px 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.quick-questions::-webkit-scrollbar { display: none; }

.quick-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border-card);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  backdrop-filter: blur(12px);
}

.quick-btn:hover {
  background: var(--primary-glow);
  color: white;
  border-color: var(--primary);
}

.quick-btn:active { transform: scale(0.95); }

/* Input Area */
.input-area {
  background: var(--bg-card);
  padding: 12px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  border-top: 1px solid var(--border-card);
  backdrop-filter: blur(20px);
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border-card);
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
  background: var(--bg-glass);
  color: var(--text-primary);
}

.input-wrapper input::placeholder {
  color: var(--text-muted);
}

.input-wrapper input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--primary-gradient);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 4px 12px var(--primary-glow);
}

.send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px var(--primary-glow);
}

.send-btn:active { transform: scale(0.95); }

/* Responsive */
@media (max-width: 480px) {
  .message { max-width: 95%; }
  .chat-container { padding: 16px; }
  .welcome-card { margin: 16px; padding: 24px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 3px; }
</style>
</head>
<body>

<div class="chat-header">
  <button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-chevron-left"></i>
  </button>
  <div class="status-wrapper">
    <div class="ai-avatar">
      <i class="fa-solid fa-robot"></i>
    </div>
    <div class="status-dot"></div>
  </div>
  <div class="header-info">
    <h2>TokenFlow AI</h2>
    <span>Assistant intelligent 24/7 • En ligne</span>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="welcome-card">
    <div class="ai-avatar">
      <i class="fa-solid fa-robot"></i>
    </div>
    <h3>Bonjour ! 👋</h3>
    <p>Je suis l'assistant IA de TokenFlow. Posez-moi toutes vos questions sur la plateforme, les investissements, les retraits, le parrainage, etc.</p>
  </div>
</div>

<div class="quick-questions">
  <button class="quick-btn" onclick="sendQuick('Comment fonctionne TokenFlow ?')">Comment ça marche ?</button>
  <button class="quick-btn" onclick="sendQuick('Comment retirer mes gains ?')">Retrait des gains</button>
  <button class="quick-btn" onclick="sendQuick('Quels sont les plans d\'investissement ?')">Plans d'investissement</button>
  <button class="quick-btn" onclick="sendQuick('Comment fonctionne le parrainage ?')">Parrainage</button>
  <button class="quick-btn" onclick="sendQuick('Quels sont les niveaux VIP ?')">Niveaux VIP</button>
  <button class="quick-btn" onclick="sendQuick('Dépôt minimum ?')">Dépôt minimum</button>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <input type="text" id="messageInput" placeholder="Posez votre question..." onkeypress="handleKeyPress(event)">
  </div>
  <button class="send-btn" onclick="sendMessage()">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>

<script>
// ============================================
// BASE DE CONNAISSANCES COMPLÈTE TOKENFLOW
// ============================================
const knowledgeBase = {
  greetings: {
    keywords: ['bonjour', 'salut', 'coucou', 'hello', 'hi', 'bonsoir', 'bienvenue', 'hey'],
    responses: [
      'Bonjour ! 👋 Comment puis-je vous aider aujourd\'hui sur TokenFlow ?',
      'Salut ! Je suis l\'IA de TokenFlow, prête à répondre à toutes vos questions.',
      'Hello ! Bienvenue sur TokenFlow. Que puis-je faire pour you ? 😊'
    ]
  },

  howItWorks: {
    keywords: ['comment', 'fonctionne', 'marche', 'utilise', 'débuter', 'commencer', 'inscription'],
    responses: [
      'TokenFlow fonctionne en 3 étapes simples :\n\n1️⃣ **Inscription** - Créez your compte avec your numéro\n2️⃣ **Dépôt** - Minimum 3000 FCFA via Mobile Money\n3️⃣ **Investissement** - Choisissez un plan et gagnez des revenus journaliers\n\nRendements de 0.8% à 1.5% par jour selon le produit.'
    ]
  },

  deposit: {
    keywords: ['dépôt', 'deposer', 'ajouter', 'fonds', 'charger', 'minimum', 'maximum'],
    responses: [
      'Pour déposer des fonds :\n\n1. Allez dans **"Dépôt"**\n2. Choisissez le montant (min. **3000 FCFA**)\n3. Sélectionnez your opérateur Mobile Money\n4. Validez le paiement\n\n✅ Solde crédité automatiquement en quelques minutes.'
    ]
  },

  withdrawal: {
    keywords: ['retrait', 'retirer', 'gains', 'argent', 'récupérer', 'cash'],
    responses: [
      'Pour retirer vos gains :\n\n1. Allez dans **"Retrait"**\n2. Configurez your portefeuille Mobile Money\n3. Entrez le montant (min. **1000 FCFA**)\n4. Confirmez\n\n⏱️ **Délai :** 24-48 heures\n✅ Directement sur your compte Mobile Money'
    ]
  },

  investment: {
    keywords: ['investissement', 'plan', 'investir', 'pack', 'produit', 'crypto', 'forex', 'gold', 'ai'],
    responses: [
      'TokenFlow propose plusieurs produits :\n\n📈 **Crypto** (31 250 - 125 000 FCFA) → 1%/jour\n💱 **Forex** (37 500 - 93 750 FCFA) → 0.9%/jour\n🥇 **Gold** (125 000 - 250 000 FCFA) → 0.7%/jour\n🤖 **AI Trading** (50 000 - 187 500 FCFA) → 1.1%/jour\n⭐ **VIP** (250 000 - 1 250 000 FCFA) → 1.4%/jour\n\nDurée : 120 jours. Revenus crédités quotidiennement !'
    ]
  },

  referral: {
    keywords: ['parrainage', 'parrain', 'filleul', 'commission', 'réseau', 'inviter'],
    responses: [
      'Programme de parrainage :\n\n🥇 **Niveau 1 :** 27% sur dépôts filleuls directs\n🥈 **Niveau 2 :** 2% sur dépôts niveau 2\n🥉 **Niveau 3 :** 1% sur dépôts niveau 3\n\n💡 Exemple : Filleul dépose 10 000 FCFA → Vous recevez 2 700 FCFA !'
    ]
  },

  vip: {
    keywords: ['vip', 'niveau', 'level', 'bronze', 'silver', 'gold', 'platinum', 'diamond'],
    responses: [
      '5 niveaux VIP disponibles :\n\n🥉 **Bronze** (0-50k) → Base\n🥈 **Silver** (50k-200k) → +5% ROI\n🥇 **Gold** (200k-500k) → +10% ROI + retraits prioritaires\n💎 **Platinum** (500k-1M) → +15% ROI + support dédié\n👑 **Diamond** (1M+) → +25% ROI + account manager'
    ]
  },

  bonus: {
    keywords: ['bonus', 'cadeau', 'gratuit', 'offre', 'bienvenue'],
    responses: [
      '🎁 **Bonus de bienvenue :**\n• **1 000 FCFA offerts** à l\'inscription\n• Pas de dépôt requis\n• Utilisable immédiatement\n\nProfitez-en pour découvrir TokenFlow sans risque !'
    ]
  },

  security: {
    keywords: ['sécurité', 'sécurisé', 'fiable', 'confiance', 'légitime'],
    responses: [
      'TokenFlow est 100% sécurisé :\n\n✅ Technologie blockchain\n✅ Cryptage SSL 256-bit\n✅ Équipe vérifiée\n✅ Paiements automatiques\n✅ Support 24/7\n✅ Milliers d\'utilisateurs satisfaits'
    ]
  },

  support: {
    keywords: ['support', 'aide', 'contact', 'problème', 'assistance'],
    responses: [
      'Support disponible 24/7 :\n\n📧 **Chat in-app** - Section Support\n📱 **Telegram** - @TokenFlow_support\n⏱️ **Réponse :** < 2 heures en moyenne'
    ]
  },

  earnings: {
    keywords: ['gains', 'revenus', 'gagner', 'profit', 'rendement', 'roi'],
    responses: [
      '3 façons de gagner sur TokenFlow :\n\n1️⃣ **Investissements** - 0.8% à 1.5%/jour\n2️⃣ **Parrainage** - Jusqu\'à 27% de commissions\n3️⃣ **Bonus VIP** - ROI supplémentaire\n\n💡 Exemple : 50 000 FCFA à 1%/jour = 500 FCFA/jour = 15 000 FCFA/mois !'
    ]
  },

  default: {
    responses: [
      'Je suis l\'IA de TokenFlow. Je peux vous aider avec :\n\n• 📊 Investissements et plans\n• 💰 Dépôts et retraits\n• 👥 Parrainage\n• 🏆 Niveaux VIP\n\nPosez une question précise ou cliquez sur les boutons ci-dessous ! 😊',
      'Je n\'ai pas compris. Pouvez-vous reformuler ? 🤔\n\nEssayez : "Comment retirer mes gains ?" ou "Quels sont les plans ?"'
    ]
  },

  thanks: {
    keywords: ['merci', 'super', 'génial', 'excellent', 'parfait'],
    responses: [
      'Avec plaisir ! 😊 N\'hésitez pas pour d\'autres questions.',
      'Je suis là pour ça ! Bonne continuation ! 🚀'
    ]
  },

  goodbye: {
    keywords: ['au revoir', 'bye', 'à bientôt', 'ciao', 'fin'],
    responses: [
      'Au revoir ! 👋 Merci d\'avoir utilisé TokenFlow AI !',
      'À bientôt ! Revenez anytime ! 💜'
    ]
  }
};

// ============================================
// FONCTIONS DE L'IA
// ============================================

function getAIResponse(message) {
  const lowerMsg = message.toLowerCase().trim();
  
  if (/^(bonjour|salut|coucou|hello|hi|bonsoir|hey)\s*$/i.test(lowerMsg)) {
    return knowledgeBase.greetings.responses[0];
  }
  
  if (/^(au revoir|bye|à bientôt|a bientot|ciao)/i.test(lowerMsg)) {
    return knowledgeBase.goodbye.responses[Math.floor(Math.random() * knowledgeBase.goodbye.responses.length)];
  }
  
  let bestMatch = null;
  let bestScore = 0;
  
  for (const [category, data] of Object.entries(knowledgeBase)) {
    if (category === 'default' || category === 'greetings' || category === 'goodbye') continue;
    
    let score = 0;
    for (const keyword of data.keywords) {
      if (lowerMsg.includes(keyword.toLowerCase())) {
        score++;
      }
    }
    
    if (score > bestScore) {
      bestScore = score;
      bestMatch = data;
    }
  }
  
  if (bestMatch && bestScore >= 1) {
    return bestMatch.responses[Math.floor(Math.random() * bestMatch.responses.length)];
  }
  
  return knowledgeBase.default.responses[Math.floor(Math.random() * knowledgeBase.default.responses.length)];
}

function addMessage(text, isUser = false) {
  const container = document.getElementById('chatContainer');
  
  const welcome = container.querySelector('.welcome-card');
  if (welcome) welcome.remove();
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
  
  let formattedText = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  
  messageDiv.innerHTML = `
    <div class="message-avatar">
      <i class="fa-solid ${isUser ? 'fa-user' : 'fa-robot'}"></i>
    </div>
    <div class="message-content">${formattedText}</div>
  `;
  
  container.appendChild(messageDiv);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message ai';
  typingDiv.id = 'typingMessage';
  typingDiv.innerHTML = `
    <div class="message-avatar">
      <i class="fa-solid fa-robot"></i>
    </div>
    <div class="message-content">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('messageInput');
  const message = input.value.trim();
  
  if (!message) return;
  
  addMessage(message, true);
  input.value = '';
  
  showTyping();
  
  const delay = 600 + Math.random() * 1000;
  setTimeout(() => {
    const typingMsg = document.getElementById('typingMessage');
    if (typingMsg) typingMsg.remove();
    
    const response = getAIResponse(message);
    addMessage(response);
  }, delay);
}

function sendQuick(question) {
  const input = document.getElementById('messageInput');
  input.value = question;
  sendMessage();
}

function handleKeyPress(event) {
  if (event.key === 'Enter') {
    sendMessage();
  }
}

window.addEventListener('load', () => {
  const container = document.getElementById('chatContainer');
  container.scrollTop = container.scrollHeight;
});
</script>

<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Accueil</span>
  </a>
  <a href="/produits_rapide" class="nav-item">
    <i class="fa-solid fa-rocket"></i>
    <span>Investir</span>
  </a>
  <a href="/team" class="nav-item">
    <i class="fa-solid fa-users"></i>
    <span>Réseau</span>
  </a>
  <a href="/profile" class="nav-item">
    <i class="fa-solid fa-user"></i>
    <span>Profil</span>
  </a>
</nav>

</body>
</html>

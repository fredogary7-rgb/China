<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | TotalÉnergies</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #06261b, #071a13);
            padding: 20px;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .banner { width: 100%; height: 180px; overflow: hidden; margin-bottom: 20px; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 0 25px 25px 25px; }
        h1 { color: #e6f5ef; font-size: 22px; margin-bottom: 20px; }

        /* Flash Messages */
        .flash { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; }
        .flash.danger { background: rgba(220, 38, 38, 0.2); color: #fca5a5; border: 1px solid #dc2626; }
        .flash.success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; }
        .flash.warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            margin-bottom: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
        }

        .input-group input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 15px;
        }

        .btn-register-submit {
            width: 100%;
            padding: 15px;
            background: #22c55e;
            color: #071a13;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .footer-text { color: rgba(230, 245, 239, 0.6); margin-bottom: 15px; font-size: 14px; }
        .btn-login-link {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <img src="static/images/t1.jpg" alt="Bannière TotalÉnergies">
    </div>

    <div class="content">
        <h1>Créer un compte</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="phone" placeholder="Numéro de téléphone" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>
            <div class="input-group">
                <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required>
            </div>
            <div class="input-group">
                <input type="text" name="code_invitation" placeholder="Code d'invitation (Optionnel)" value="{{ code_ref }}">
            </div>

            <button type="submit" class="btn-register-submit">
                <i class="fa-solid fa-user-plus"></i> S'inscrire
            </button>
        </form>

        <div class="footer-text">Déjà un compte ?</div>
        <a href="{{ url_for('connexion_page') }}" class="btn-login-link">
            Se connecter
        </a>
    </div>
</div>

</body>
</html>

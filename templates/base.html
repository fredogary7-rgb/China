<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366F1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="TokenFlow - Plateforme d'investissement et de trading premium">
    <title>{% block title %}TokenFlow{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Fintech CSS Framework -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fintech.css') }}">
    
    <!-- Additional CSS for specific pages -->
    {% block extra_css %}{% endblock %}
    
    <style>
        /* ===== ANIMATIONS FLUIDES GLOBALES ===== */
        
        /* Animations d'entrée */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideInBottom {
            from {
                opacity: 0;
                transform: translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Transitions fluides pour tous les éléments */
        * {
            transition: all var(--transition-fast) ease;
        }
        
        /* Animations de chargement */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: calc(200px + 100%) 0;
            }
        }
        
        .loading-shimmer {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--border-color) 50%, var(--bg-card) 75%);
            background-size: 200px 100%;
            animation: shimmer 1.5s infinite;
        }
        
        /* Animations de hover améliorées */
        .hover-lift {
            transition: all var(--transition-normal) cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px var(--shadow-hover);
        }
        
        .hover-scale {
            transition: transform var(--transition-fast) ease;
        }
        
        .hover-scale:hover {
            transform: scale(1.02);
        }
        
        /* Animations de focus */
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        
        /* Animations de scroll */
        .scroll-fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .scroll-fade-in.in-view {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Animations stagger pour les listes */
        .stagger-item {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .stagger-item:nth-child(1) { animation-delay: 0.1s; }
        .stagger-item:nth-child(2) { animation-delay: 0.2s; }
        .stagger-item:nth-child(3) { animation-delay: 0.3s; }
        .stagger-item:nth-child(4) { animation-delay: 0.4s; }
        .stagger-item:nth-child(5) { animation-delay: 0.5s; }
        .stagger-item:nth-child(6) { animation-delay: 0.6s; }
        
        /* Animations pour les boutons */
        .btn-animated {
            position: relative;
            overflow: hidden;
        }
        
        .btn-animated::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-animated:active::before {
            width: 300px;
            height: 300px;
        }
        
        /* Animations pour les cartes */
        .card-animated {
            transition: all var(--transition-normal) cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-animated:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px var(--shadow-hover);
        }
        
        /* Animations pour les inputs */
        .input-animated {
            position: relative;
        }
        
        .input-animated input:focus + .input-border {
            transform: scaleX(1);
        }
        
        .input-border {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition-normal) ease;
        }
        
        /* Animations de chargement pour les modals */
        .modal-animated {
            animation: scaleIn 0.3s ease-out;
        }
        
        /* Animations pour les notifications */
        .notification-slide-in {
            animation: slideInBottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Classes utilitaires d'animation */
        .animate-fade-in { animation: fadeInUp 0.6s ease; }
        .animate-fade-left { animation: fadeInLeft 0.6s ease; }
        .animate-fade-right { animation: fadeInRight 0.6s ease; }
        .animate-scale-in { animation: scaleIn 0.4s ease; }
        .animate-pulse { animation: pulse 2s infinite; }
        
        /* Délais d'animation */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
        
        /* Page-specific overrides */
        {% block page_styles %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        {% if message is mapping %}
                            showToast('{{ message.title }}', '{{ category }}');
                            setTimeout(() => showToast('{{ message.message }}', 'info'), 500);
                        {% else %}
                            showToast('{{ message }}', '{{ category }}');
                        {% endif %}
                    });
                </script>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <!-- Main Content -->
    {% block content %}{% endblock %}

    <style>
        /* Bottom Navigation - Premium Fintech Style (Binance/Revolut) */
        .bottom-nav {
          position: fixed;
          bottom: 16px;
          left: 50%;
          transform: translateX(-50%);
          width: calc(100% - 32px);
          max-width: 400px;
          background: rgba(30, 41, 59, 0.85);
          backdrop-filter: blur(24px) saturate(180%);
          -webkit-backdrop-filter: blur(24px) saturate(180%);
          border: 1px solid rgba(148, 163, 184, 0.15);
          border-radius: 24px;
          display: none;
          justify-content: center;
          align-items: center;
          padding: 8px 12px;
          padding-bottom: calc(8px + env(safe-area-inset-bottom));
          z-index: 1000;
          box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.4),
            0 2px 8px rgba(0, 0, 0, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
          gap: 4px;
        }
        
        .bottom-nav::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          border-radius: 24px;
          background: linear-gradient(
            135deg,
            rgba(99, 102, 241, 0.1) 0%,
            rgba(139, 92, 246, 0.05) 50%,
            transparent 100%
          );
          pointer-events: none;
          z-index: -1;
        }
        
        .bottom-nav .nav-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 4px;
          text-decoration: none;
          color: var(--text-muted);
          font-size: 10px;
          font-weight: 600;
          letter-spacing: 0.3px;
          padding: 10px 16px;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          text-align: center;
          border-radius: 16px;
          -webkit-tap-highlight-color: transparent;
          user-select: none;
          -webkit-user-select: none;
          position: relative;
          min-width: 64px;
        }
        
        .bottom-nav .nav-item i {
          font-size: 20px;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          position: relative;
          z-index: 1;
        }
        
        .bottom-nav .nav-item span {
          font-size: 10px;
          font-weight: 600;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          position: relative;
          z-index: 1;
        }
        
        .bottom-nav .nav-item:hover {
          color: var(--primary);
          background: rgba(99, 102, 241, 0.08);
          transform: translateY(-2px);
        }
        
        .bottom-nav .nav-item.active {
          color: var(--primary);
          background: rgba(99, 102, 241, 0.15);
          box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        .bottom-nav .nav-item.active i {
          transform: scale(1.15) translateY(-2px);
          filter: drop-shadow(0 2px 4px rgba(99, 102, 241, 0.4));
        }
        
        .bottom-nav .nav-item.active::after {
          content: '';
          position: absolute;
          bottom: 4px;
          left: 50%;
          transform: translateX(-50%);
          width: 4px;
          height: 4px;
          border-radius: 50%;
          background: var(--primary);
          box-shadow: 0 0 8px var(--primary);
        }
        
        .bottom-nav .nav-item:active {
          transform: scale(0.95);
          opacity: 0.9;
        }
        
        /* Glow animation for active item */
        @keyframes navGlow {
          0%, 100% {
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
          }
          50% {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4), 0 0 30px rgba(99, 102, 241, 0.1);
          }
        }
        
        .bottom-nav .nav-item.active {
          animation: navGlow 2s ease-in-out infinite;
        }
        
        /* Support for iPhone X and newer with notch */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
          .bottom-nav {
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
          }
        }
        
        /* Add padding to body when nav is visible */
        body.has-bottom-nav {
          padding-bottom: calc(90px + env(safe-area-inset-bottom));
        }
        
    /* Ensure proper viewport on mobile devices */
    @media (max-width: 768px) {
      body:not(.dashboard-page) .bottom-nav {
        display: flex !important;
      }
      
      body {
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      
      body.has-bottom-nav {
        padding-bottom: calc(90px + env(safe-area-inset-bottom)) !important;
      }
      
      html {
        height: -webkit-fill-available;
      }
    }
    
    /* Dashboard-specific overrides - ensure sidebar works correctly */
    .dashboard-page .bottom-nav {
      display: none !important;
    }
    
    .dashboard-page body.has-bottom-nav {
      padding-bottom: 0 !important;
    }
    
    /* Auth pages - hide bottom nav completely */
    .auth-page .bottom-nav {
      display: none !important;
    }
        
        /* Small screens */
        @media (max-width: 360px) {
          .bottom-nav {
            width: calc(100% - 24px);
            bottom: 12px;
            padding: 6px 8px;
            border-radius: 20px;
          }
          
          .bottom-nav .nav-item {
            padding: 8px 10px;
            min-width: 56px;
          }
          
          .bottom-nav .nav-item i {
            font-size: 18px;
          }
          
          .bottom-nav .nav-item span {
            font-size: 9px;
          }
        }
    </style>
    
    <script>
    // Immediately hide bottom nav on auth pages before DOM renders
    (function() {
      var currentPath = window.location.pathname;
      var hideNavPages = ['/connexion', '/inscription', '/login', '/register', '/'];
      var shouldHideNav = hideNavPages.some(function(page) { 
        return currentPath.startsWith(page); 
      });
      
      if (shouldHideNav) {
        document.documentElement.style.setProperty('--bottom-nav-display', 'none !important');
      }
    })();

    // Show bottom nav on specific pages (deposit, retrait, etc.) but NOT on auth pages
    document.addEventListener('DOMContentLoaded', function() {
      const bottomNav = document.getElementById('bottomNav');
      const currentPath = window.location.pathname;
      
      // Pages where bottom nav should be shown
      const showNavPages = ['/deposit', '/retrait', '/produits_rapide', '/achats', '/historique', '/team', '/profile', '/ai-chat', '/ai-trading', '/formation/', '/netflix'];
      
      // Auth pages where bottom nav should ALWAYS be hidden
      const hideNavPages = ['/connexion', '/inscription', '/login', '/register', '/'];
      
      const shouldShowNav = showNavPages.some(page => currentPath.startsWith(page));
      const shouldHideNav = hideNavPages.some(page => currentPath.startsWith(page));
      
      if (bottomNav) {
        if (shouldHideNav) {
          bottomNav.style.display = 'none';
        } else if (shouldShowNav && !shouldHideNav) {
          bottomNav.style.display = 'flex';
          document.body.classList.add('has-bottom-nav');
          
          // Set active state
          bottomNav.querySelectorAll('.nav-item').forEach(item => {
            const href = item.getAttribute('href');
            if (href === currentPath) {
              item.classList.add('active');
            }
          });
        } else {
          bottomNav.style.display = 'none';
        }
      }
    });
    </script>
    
    <!-- Global Currency Preference System -->
    <script>
    // ============================================
    // SYSTÈME DE DEVISE GLOBALE
    // Synchronisation automatique entre toutes les pages
    // Devise de base: USD
    // ============================================
    window.TokenFlow = window.TokenFlow || {};
    
    // Taux de change (USD est la devise de base)
    const EXCHANGE_RATES = {
        USD: 1,
        EUR: 0.92
    };
    
    const CURRENCY_SYMBOLS = {
        USD: '$',
        EUR: '€'
    };
    
    // Récupérer la devise préférée (défaut: USD)
    window.TokenFlow.getPreferredCurrency = function() {
        return localStorage.getItem('preferredCurrency') || 'USD';
    };
    
    // Définir la devise préférée
    window.TokenFlow.setPreferredCurrency = function(currency) {
        if (['USD', 'EUR'].includes(currency)) {
            localStorage.setItem('preferredCurrency', currency);
            // Déclencher un événement pour mettre à jour les autres onglets
            window.dispatchEvent(new Event('storage'));
        }
    };
    
    // Convertir un montant USD vers la devise préférée
    window.TokenFlow.convertFromUSD = function(amountUSD, targetCurrency) {
        targetCurrency = targetCurrency || window.TokenFlow.getPreferredCurrency();
        if (targetCurrency === 'USD') return amountUSD;
        return Math.round(amountUSD * EXCHANGE_RATES[targetCurrency] * 100) / 100;
    };
    
    // Convertir un montant de la devise préférée vers USD
    window.TokenFlow.convertToUSD = function(amount, fromCurrency) {
        fromCurrency = fromCurrency || window.TokenFlow.getPreferredCurrency();
        if (fromCurrency === 'USD') return amount;
        return Math.round(amount / EXCHANGE_RATES[fromCurrency] * 100) / 100;
    };
    
    // Formater un montant avec la devise préférée
    window.TokenFlow.formatCurrency = function(amountUSD, options = {}) {
        const currency = options.currency || window.TokenFlow.getPreferredCurrency();
        const converted = window.TokenFlow.convertFromUSD(amountUSD, currency);
        const symbol = CURRENCY_SYMBOLS[currency];
        
        // Pour USD et EUR, on garde 2 décimales
        return symbol + converted.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    };
    
    // Mettre à jour tous les éléments avec data-usd
    window.TokenFlow.updateAllCurrencies = function() {
        const currency = window.TokenFlow.getPreferredCurrency();
        
        // Mettre à jour tous les éléments avec data-usd
        document.querySelectorAll('[data-usd]').forEach(el => {
            const usd = parseFloat(el.dataset.usd);
            if (!isNaN(usd)) {
                el.textContent = window.TokenFlow.formatCurrency(usd);
            }
        });
        
        // Mettre à jour les boutons de toggle
        document.querySelectorAll('.currency-toggle button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.currency === currency);
        });
        
        // Déclencher un événement personnalisé
        document.dispatchEvent(new CustomEvent('currencyChanged', { detail: { currency } }));
    };
    
    // Écouter les changements de devise depuis d'autres onglets
    window.addEventListener('storage', function(e) {
        if (e.key === 'preferredCurrency') {
            window.TokenFlow.updateAllCurrencies();
        }
    });
    
    // Initialiser au chargement
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer la devise préférée au chargement
        setTimeout(() => {
            window.TokenFlow.updateAllCurrencies();
        }, 100);
    });
    </script>

    <!-- Page-specific JavaScript -->
    {% block extra_js %}
    <script>
        // ===== ANIMATIONS FLUIDES JAVASCRIPT =====
        
        // Initialisation des animations
        document.addEventListener('DOMContentLoaded', function() {
            initFluidAnimations();
            initScrollAnimations();
            initHoverEffects();
            initLoadingStates();
        });
        
        // Animations d'entrée fluides
        function initFluidAnimations() {
            // Animation des éléments au chargement
            const animatedElements = document.querySelectorAll('.animate-fade-in, .animate-fade-left, .animate-fade-right, .animate-scale-in');
            animatedElements.forEach((el, index) => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.animationPlayState = 'running';
                }, index * 100);
            });
            
            // Animation des cartes avec stagger
            const cards = document.querySelectorAll('.product-card, .glass-card, .stat-card');
            cards.forEach((card, index) => {
                card.classList.add('stagger-item');
                card.style.animationDelay = `${index * 0.1}s`;
            });
        }
        
        // Animations de scroll
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    }
                });
            }, observerOptions);
            
            // Observer tous les éléments avec scroll-fade-in
            document.querySelectorAll('.scroll-fade-in').forEach(el => {
                observer.observe(el);
            });
            
            // Animation des sections au scroll
            const sections = document.querySelectorAll('.section-header, .balance-bar, .info-banner');
            sections.forEach(section => {
                section.classList.add('scroll-fade-in');
                observer.observe(section);
            });
        }
        
        // Effets de hover améliorés
        function initHoverEffects() {
            // Ajouter les classes de hover aux éléments appropriés
            document.querySelectorAll('.product-card, .glass-card, .btn-primary, .btn-secondary').forEach(el => {
                if (!el.classList.contains('hover-lift') && !el.classList.contains('hover-scale')) {
                    el.classList.add('hover-lift');
                }
            });
            
            // Animation des boutons
            document.querySelectorAll('.btn-primary, .btn-secondary').forEach(btn => {
                btn.classList.add('btn-animated');
            });
            
            // Animation des inputs
            document.querySelectorAll('input, select, textarea').forEach(input => {
                if (!input.closest('.input-animated')) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'input-animated';
                    input.parentNode.insertBefore(wrapper, input);
                    wrapper.appendChild(input);
                    
                    const border = document.createElement('div');
                    border.className = 'input-border';
                    wrapper.appendChild(border);
                }
            });
        }
        
        // États de chargement
        function initLoadingStates() {
            // Animation de chargement pour les boutons
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.btn-primary, .btn-secondary');
                if (btn && !btn.classList.contains('loading')) {
                    btn.classList.add('loading');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + btn.textContent.trim();
                    
                    // Simuler un délai de chargement (à remplacer par la vraie logique)
                    setTimeout(() => {
                        btn.classList.remove('loading');
                        btn.innerHTML = btn.innerHTML.replace('<i class="fa-solid fa-spinner fa-spin"></i> ', '');
                    }, 2000);
                }
            });
        }
        
        // Fonction pour animer les éléments dynamiquement
        window.FluidAnimations = {
            fadeIn: function(element, delay = 0) {
                element.style.opacity = '0';
                element.style.transform = 'translateY(20px)';
                element.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                
                setTimeout(() => {
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0)';
                }, delay);
            },
            
            slideIn: function(element, direction = 'up', delay = 0) {
                const transforms = {
                    up: 'translateY(30px)',
                    down: 'translateY(-30px)',
                    left: 'translateX(30px)',
                    right: 'translateX(-30px)'
                };
                
                element.style.opacity = '0';
                element.style.transform = transforms[direction] || transforms.up;
                element.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                
                setTimeout(() => {
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0)';
                }, delay);
            },
            
            scaleIn: function(element, delay = 0) {
                element.style.opacity = '0';
                element.style.transform = 'scale(0.9)';
                element.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                
                setTimeout(() => {
                    element.style.opacity = '1';
                    element.style.transform = 'scale(1)';
                }, delay);
            },
            
            pulse: function(element, duration = 1000) {
                element.style.animation = `pulse ${duration}ms infinite`;
            }
        };
        
        // Animation des modals
        const originalOpenModal = window.TokenFlow?.openModal;
        if (originalOpenModal) {
            window.TokenFlow.openModal = function(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.classList.add('modal-animated');
                }
                return originalOpenModal.call(this, modalId);
            };
        }
        
        // Animation des toasts
        const originalShowToast = window.showToast;
        if (originalShowToast) {
            window.showToast = function(message, type = 'info') {
                const toast = originalShowToast.call(this, message, type);
                if (toast) {
                    toast.classList.add('notification-slide-in');
                }
                return toast;
            };
        }

        // ============================================
        // NOTIFICATION PERMISSION REQUEST
        // ============================================
        
        // Demander la permission pour les notifications push
        function requestNotificationPermission() {
            // Vérifier si le navigateur supporte les notifications
            if (!('Notification' in window)) {
                console.log('Ce navigateur ne supporte pas les notifications');
                return;
            }
            
            // Vérifier le statut actuel des permissions
            const currentPermission = Notification.permission;
            
            if (currentPermission === 'granted') {
                console.log('Notifications déjà autorisées');
                return;
            }
            
            if (currentPermission === 'denied') {
                console.log('Notifications précédemment refusées');
                return;
            }
            
            // Demander la permission après un court délai pour une meilleure UX
            setTimeout(() => {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        console.log('✅ Notification permission granted');
                        // Afficher une notification de bienvenue
                        showWelcomeNotification();
                    } else if (permission === 'denied') {
                        console.log('❌ Notification permission denied');
                    } else {
                        console.log('⚠️ Notification permission dismissed');
                    }
                });
            }, 2000); // Délai de 2 secondes après le chargement
        }
        
        // Afficher une notification de bienvenue
        function showWelcomeNotification() {
            if (Notification.permission === 'granted') {
                try {
                    new Notification('TokenFlow', {
                        body: '🔔 Bienvenue sur TokenFlow ! Vous recevrez désormais vos notifications en temps réel.',
                        icon: '/static/images/logo.png',
                        badge: '/static/images/badge.png',
                        tag: 'welcome',
                        requireInteraction: false
                    });
                } catch (e) {
                    console.log('Erreur notification:', e);
                }
            }
        }
        
        // Initialiser la demande de permission au chargement
        document.addEventListener('DOMContentLoaded', function() {
            // Attendre que la page soit complètement chargée
            if (document.readyState === 'complete') {
                requestNotificationPermission();
            } else {
                window.addEventListener('load', function() {
                    requestNotificationPermission();
                });
            }
        });
    </script>
    {% endblock %}
</body>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrait confirmé | Emirates</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary: #5D5FEF;
  --bg-page: #F4F7FE;
  --white: #ffffff;
  --text-dark: #1A202C;
  --text-muted: #718096;
  --success: #22c55e;
}

*{ box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }

body {
    background-color: var(--bg-page);
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: var(--white);
    width: 100%;
    max-width: 400px;
    padding: 40px 30px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.02);
}

.success-icon {
    width: 80px;
    height: 80px;
    background: rgba(34, 197, 94, 0.1);
    color: var(--success);
    font-size: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin: 0 auto 25px;
    animation: scaleUp 0.5s ease-out;
}

@keyframes scaleUp {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

h2 {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 12px;
    letter-spacing: -0.5px;
}

p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    font-weight: 600;
    margin-bottom: 30px;
}

.status-badge {
    display: inline-block;
    background: #F8FAFF;
    padding: 10px 20px;
    border-radius: 15px;
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    border: 1px solid rgba(93, 95, 239, 0.1);
    margin-bottom: 30px;
}

.btn {
    background: var(--primary);
    color: white;
    padding: 18px;
    width: 100%;
    display: block;
    border-radius: 20px;
    font-weight: 800;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(93, 95, 239, 0.2);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(93, 95, 239, 0.3);
}

.footer-text {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 25px;
    font-weight: 600;
}
</style>

</head>
<body>

<div class="card">
    <div class="success-icon">
        <i class="fa-solid fa-check"></i>
    </div>
    
    <h2>Demande de retrait créée</h2>
    
    <p>
        Votre demande a été transmise avec succès à nos services financiers. 
        Le traitement est généralement effectué sous <strong>24 heures</strong>.
    </p>

    <div class="status-badge">
        <i class="fa-solid fa-clock-rotate-left"></i> Statut : En attente de vérification
    </div>

    <a href="/dashboard" class="btn">Retour au tableau de bord</a>

    <div class="footer-text">
        ID de transaction : <span style="color: var(--text-dark);">#EMR-{{ range(1000, 9999)|random }}</span>
    </div>
</div>

</body>
</html>

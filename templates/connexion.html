<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TotalEnergies</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #06261b, #071a13);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(34, 197, 94, 0.1);
        }

        .banner { width: 100%; height: 180px; overflow: hidden; margin-bottom: 20px; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 0 25px 25px 25px; }
        h1 { color: #e6f5ef; font-size: 22px; margin-bottom: 20px; }

        .flash { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; text-align: left; }
        .flash.danger { background: rgba(220, 38, 38, 0.2); color: #fca5a5; border: 1px solid #dc2626; }
        .flash.success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            margin-bottom: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group i { color: #22c55e; width: 20px; }

        .input-group input, .input-group select {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 15px;
        }

        .input-group select option { background: #071a13; color: white; }
        .input-group input::placeholder { color: rgba(230, 245, 239, 0.4); }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #22c55e;
            color: #071a13;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-login:hover { background: #16a34a; transform: translateY(-2px); }

        .footer-text { color: rgba(230, 245, 239, 0.6); margin-bottom: 15px; font-size: 14px; }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <img src="{{ url_for('static', filename='images/t1.jpg') }}" alt="Bannière TotalEnergies">
    </div>

    <div class="content">
        <h1>Connexion</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{ category }}">
                {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <i class="fa-solid fa-globe"></i>
                <select name="pays" required>
                    <option value="" disabled selected>Pays</option>
                    <option value="Bénin">🇧🇯 Bénin</option>
                    <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                    <option value="Cameroun">🇨🇲 Cameroun</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Togo">🇹🇬 Togo</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" name="phone" placeholder="Numéro de téléphone" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>
        </form>

        <div class="footer-text">Pas encore de compte ?</div>
        <a href="{{ url_for('inscription_page') }}" class="btn-register">
            <i class="fa-solid fa-user-plus"></i> Créer un compte
        </a>
    </div>
</div>

</body>
</html>

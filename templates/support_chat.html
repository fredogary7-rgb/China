<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Chat | Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    min-height:100vh;
}

.app{
    max-width:480px;
    margin:auto;
    padding:25px 16px 120px;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header h2{
    margin:0 0 12px 0;
    font-size:22px;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding-right:5px;
    margin-bottom:12px;
}

.message{
    margin-bottom:12px;
    max-width:75%;
    padding:12px 14px;
    border-radius:16px;
    line-height:1.4;
    word-wrap:break-word;
}

.message.user{
    background:rgba(0,198,255,0.15);
    align-self:flex-start;
}

.message.admin{
    background:rgba(0,198,255,0.7);
    align-self:flex-end;
    color:#fff;
}

.form-container{
    display:flex;
    gap:8px;
}

.form-container input{
    flex:1;
    padding:14px;
    border-radius:25px;
    border:none;
    font-size:14px;
}

.form-container button{
    padding:14px 20px;
    border:none;
    border-radius:25px;
    background:#00c6ff;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.form-container button:hover{
    background:#0072ff;
}

/* ============================================
   BOTTOM NAVIGATION - Premium Style
   ============================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(148, 163, 184, 0.2);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 1000;
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
}

.bottom-nav .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  color: #718096;
  font-size: 10px;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: 12px;
  transition: all 0.3s;
  min-width: 60px;
}

.bottom-nav .nav-item i {
  font-size: 20px;
  transition: all 0.3s;
}

.bottom-nav .nav-item:hover,
.bottom-nav .nav-item.active {
  color: #5D5FEF;
}

.bottom-nav .nav-item:hover i,
.bottom-nav .nav-item.active i {
  transform: translateY(-2px);
}

.bottom-nav .nav-item.active {
  background: rgba(93, 95, 239, 0.15);
}

body {
  padding-bottom: 80px;
}
</style>
</head>
<body>

<div class="app">

    <div class="header">
        <h2>Chat support : {{ phone }}</h2>
    </div>

    <div class="chat-box" id="chatBox">
        {% for msg in messages %}
            <div class="message {% if msg.sender=='user' %}user{% else %}admin{% endif %}">
                {{ msg.message }}
            </div>
        {% else %}
            <div class="message user">Aucun message pour le moment.</div>
        {% endfor %}
    </div>

    <form method="POST" class="form-container">
        <input type="text" name="message" placeholder="Écrire un message..." required autocomplete="off">
        <button type="submit"><i class="fa-solid fa-paper-plane"></i></button>
    </form>

</div>

<script>
    // Scroll automatique vers le bas
    const chatBox = document.getElementById('chatBox');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>

<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Accueil</span>
  </a>
  <a href="/produits_rapide" class="nav-item">
    <i class="fa-solid fa-rocket"></i>
    <span>Investir</span>
  </a>
  <a href="/team" class="nav-item">
    <i class="fa-solid fa-users"></i>
    <span>Réseau</span>
  </a>
  <a href="/profile" class="nav-item">
    <i class="fa-solid fa-user"></i>
    <span>Profil</span>
  </a>
</nav>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Admin | Golden Yield</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    min-height:100vh;
}

.app{
    max-width:480px;
    margin:auto;
    padding:25px 16px 120px;
}

.header h2{
    margin:0 0 12px 0;
    font-size:22px;
}

.user-list{
    list-style:none;
    padding:0;
}

.user-list li{
    background:rgba(255,255,255,0.08);
    padding:14px 18px;
    border-radius:16px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.user-list li:hover{
    background:rgba(0,198,255,0.2);
}

.user-list a{
    text-decoration:none;
    color:#fff;
    flex:1;
}

.badge{
    background:#ff3b3b;
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:2px 8px;
    border-radius:12px;
}

/* ============================================
   BOTTOM NAVIGATION - Premium Style
   ============================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(148, 163, 184, 0.2);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 1000;
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
}

.bottom-nav .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  color: #718096;
  font-size: 10px;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: 12px;
  transition: all 0.3s;
  min-width: 60px;
}

.bottom-nav .nav-item i {
  font-size: 20px;
  transition: all 0.3s;
}

.bottom-nav .nav-item:hover,
.bottom-nav .nav-item.active {
  color: #5D5FEF;
}

.bottom-nav .nav-item:hover i,
.bottom-nav .nav-item.active i {
  transform: translateY(-2px);
}

.bottom-nav .nav-item.active {
  background: rgba(93, 95, 239, 0.15);
}

body {
  padding-bottom: 80px;
}
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <h2>Support Admin</h2>
        <p>Liste des utilisateurs ayant envoyé des messages</p>
    </div>

    <ul class="user-list">
        {% for user in users %}
        <li>
            <a href="{{ url_for('admin_support_chat', phone=user.user_phone) }}">
                {{ user.user_phone }}
            </a>
            {% if user.unread_count > 0 %}
            <span class="badge">{{ user.unread_count }}</span>
            {% endif %}
        </li>
        {% else %}
        <li>Aucun utilisateur pour le moment.</li>
        {% endfor %}
    </ul>
</div>

<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Accueil</span>
  </a>
  <a href="/produits_rapide" class="nav-item">
    <i class="fa-solid fa-rocket"></i>
    <span>Investir</span>
  </a>
  <a href="/team" class="nav-item">
    <i class="fa-solid fa-users"></i>
    <span>Réseau</span>
  </a>
  <a href="/profile" class="nav-item">
    <i class="fa-solid fa-user"></i>
    <span>Profil</span>
  </a>
</nav>

</body>
</html>
